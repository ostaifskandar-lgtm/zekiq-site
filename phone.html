<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZEKiQ Garson — Mobile</title>
  <meta name="description" content="Pair Android waiter app with ZEKiQ POS" />
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Noto+Sans+Arabic:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/site.css" />
</head>
<body data-page="phone" data-i18n-title="phone_title" data-i18n-meta="phone_meta" data-garson-dl-btn="phoneGarsonBtn" data-garson-version-id="phoneGarsonVersion">

  <header>
    <div class="nav">
      <a href="index.html" class="brand">
        <img src="assets/logo.svg" width="40" height="40" alt="ZEKiQ" />
        <span>Z</span>EKiQ <span class="brand-sub">POS</span>
      </a>
      <nav class="nav-links">
        <a href="index.html" data-nav="home" data-i18n="nav_features">Features</a>
        <a href="garson.html" data-nav="garson" data-i18n="nav_garson">Garson app</a>
        <a href="phone.html" data-nav="phone" data-i18n="nav_phone">Pair</a>
        <a href="download.html" data-nav="download" data-i18n="nav_download">Download</a>
        <div class="lang-switch" role="group">
          <button type="button" data-lang="en" class="on">EN</button>
          <button type="button" data-lang="tr">TR</button>
          <button type="button" data-lang="ar">AR</button>
        </div>
      </nav>
    </div>
  </header>

  <main class="page-center">
    <div class="page-card wide">
      <div class="page-head">
        <img src="assets/logo.svg" width="64" height="64" alt="" class="page-logo" />
        <h1 data-i18n="phone_h1">Waiter app on your phone</h1>
        <p data-i18n-html-only="phone_sub"></p>
      </div>

      <div class="warn-box" data-i18n-html-only="phone_warn"></div>

      <div class="flow">
        <div class="flow-item">
          <div class="flow-num">1</div>
          <div><h3 data-i18n="phone_s1_t"></h3><p data-i18n-html-only="phone_s1_d"></p></div>
        </div>
        <div class="flow-item">
          <div class="flow-num">2</div>
          <div><h3 data-i18n="phone_s2_t"></h3><p data-i18n-html-only="phone_s2_d"></p></div>
        </div>
        <div class="flow-item">
          <div class="flow-num">3</div>
          <div><h3 data-i18n="phone_s3_t"></h3><p data-i18n="phone_s3_d"></p></div>
        </div>
        <div class="flow-item">
          <div class="flow-num">4</div>
          <div>
            <h3 data-i18n="phone_s4_t"></h3>
            <p data-i18n="phone_s4_d"></p>
            <p class="flow-note" data-i18n-html-only="phone_s4_ip"></p>
          </div>
        </div>
        <div class="flow-item">
          <div class="flow-num">5</div>
          <div><h3 data-i18n="phone_s5_t"></h3><p data-i18n="phone_s5_d"></p></div>
        </div>
      </div>

      <div class="warn-box warn-danger">
        <div data-i18n-html-only="phone_fix"></div>
        <ul class="checklist">
          <li data-i18n="phone_fix_1"></li>
          <li data-i18n="phone_fix_2"></li>
          <li data-i18n="phone_fix_3"></li>
          <li data-i18n="phone_fix_4"></li>
          <li data-i18n="phone_fix_5"></li>
        </ul>
      </div>

      <div class="cta-row center">
        <a id="phoneGarsonBtn" class="btn btn-gold" href="downloads/ToninoStaff.apk">⬇️ ToninoStaff.apk</a>
        <a href="download.html" class="btn btn-ghost" data-i18n="phone_dl_first">Download Windows cashier</a>
      </div>
      <p class="ver-line" id="phoneGarsonVersion" aria-live="polite"></p>
    </div>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/site.js"></script>
  <script>ZekiqSite.init();</script>
</body>
</html>
